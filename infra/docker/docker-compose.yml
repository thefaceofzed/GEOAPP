version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: geoeconwars-postgres
    environment:
      POSTGRES_DB: geoeconwars
      POSTGRES_USER: geoeconwars
      POSTGRES_PASSWORD: geoeconwars
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoeconwars -d geoeconwars"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
