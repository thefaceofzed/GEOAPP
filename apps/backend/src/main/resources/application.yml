spring:
  application:
    name: geoecon-wars-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/geoeconwars}
    username: ${DATABASE_USERNAME:geoeconwars}
    password: ${DATABASE_PASSWORD:geoeconwars}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  servlet:
    context-path: /

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  refresh-cookie-secure: ${APP_REFRESH_COOKIE_SECURE:false}
  rules-path: ${APP_RULES_PATH:../../packages/scenario-rules/rules}
  access-token-minutes: 30
  refresh-token-days: 14
  allowed-origins:
    - ${APP_FRONTEND_URL:http://localhost:5173}
  quota:
    guest-lifetime-limit: 3
    free-daily-limit: 3
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:change-me-access-secret-change-me-access-secret}
    refresh-secret: ${JWT_REFRESH_SECRET:change-me-refresh-secret-change-me-refresh-secret}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    pro-price-id: ${STRIPE_PRO_PRICE_ID:}
  ingestion:
    enabled: ${APP_INGESTION_ENABLED:false}
    schedule-enabled: ${APP_INGESTION_SCHEDULE_ENABLED:false}
    bootstrap-on-startup: ${APP_INGESTION_BOOTSTRAP_ON_STARTUP:false}
    max-signals-per-source: ${APP_INGESTION_MAX_SIGNALS_PER_SOURCE:25}
    max-summary-length: ${APP_INGESTION_MAX_SUMMARY_LENGTH:240}
    refresh-interval-ms: ${APP_INGESTION_REFRESH_INTERVAL_MS:1800000}
    user-agent: ${APP_INGESTION_USER_AGENT:GEOECON-WARS/0.1 (+https://localhost)}
    news:
      enabled: ${APP_INGESTION_NEWS_ENABLED:false}
      base-url: ${APP_INGESTION_NEWS_BASE_URL:https://api.gdeltproject.org/api/v2/doc/doc}
      api-key: ${APP_INGESTION_NEWS_API_KEY:}
    commodities:
      enabled: ${APP_INGESTION_COMMODITIES_ENABLED:false}
      base-url: ${APP_INGESTION_COMMODITIES_BASE_URL:https://stooq.com/q/l/}
      api-key: ${APP_INGESTION_COMMODITIES_API_KEY:}
    fx:
      enabled: ${APP_INGESTION_FX_ENABLED:false}
      base-url: ${APP_INGESTION_FX_BASE_URL:https://api.frankfurter.app/latest}
      api-key: ${APP_INGESTION_FX_API_KEY:}
    sanctions:
      enabled: ${APP_INGESTION_SANCTIONS_ENABLED:false}
      base-url: ${APP_INGESTION_SANCTIONS_BASE_URL:https://www.treasury.gov/ofac/downloads/sdn.xml}
      api-key: ${APP_INGESTION_SANCTIONS_API_KEY:}
    macro:
      enabled: ${APP_INGESTION_MACRO_ENABLED:false}
      base-url: ${APP_INGESTION_MACRO_BASE_URL:https://api.stlouisfed.org/fred/releases/dates}
      api-key: ${APP_INGESTION_MACRO_API_KEY:}
    trade:
      enabled: ${APP_INGESTION_TRADE_ENABLED:false}
      base-url: ${APP_INGESTION_TRADE_BASE_URL:https://api.worldbank.org/v2/country}
      api-key: ${APP_INGESTION_TRADE_API_KEY:}
  intelligence:
    enabled: ${APP_INTELLIGENCE_ENABLED:true}
    stream-enabled: ${APP_INTELLIGENCE_STREAM_ENABLED:true}
    observed-limit-default: ${APP_INTELLIGENCE_OBSERVED_LIMIT_DEFAULT:8}
    observed-limit-max: ${APP_INTELLIGENCE_OBSERVED_LIMIT_MAX:20}
    forecast-horizon-days-default: ${APP_INTELLIGENCE_FORECAST_HORIZON_DAYS_DEFAULT:30}
    forecast-horizon-days-max: ${APP_INTELLIGENCE_FORECAST_HORIZON_DAYS_MAX:180}
    stream-interval-ms: ${APP_INTELLIGENCE_STREAM_INTERVAL_MS:15000}
    cache-ttl-ms: ${APP_INTELLIGENCE_CACHE_TTL_MS:20000}
    max-concurrent-streams: ${APP_INTELLIGENCE_MAX_CONCURRENT_STREAMS:250}
    max-concurrent-streams-per-client: ${APP_INTELLIGENCE_MAX_CONCURRENT_STREAMS_PER_CLIENT:3}
    rate-limit:
      enabled: ${APP_INTELLIGENCE_RATE_LIMIT_ENABLED:true}
      requests-per-window: ${APP_INTELLIGENCE_RATE_LIMIT_REQUESTS_PER_WINDOW:120}
      window-ms: ${APP_INTELLIGENCE_RATE_LIMIT_WINDOW_MS:60000}
